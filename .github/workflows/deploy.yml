name: Deploy to GitHub Pages

# Reliable replacement for the legacy "Deploy from a branch" builder,
# which intermittently stalled (build OK, deploy stuck/queued).

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you re-run a deploy by hand from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # single-file app lives at the repo root
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
