<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="PPL" />
  <meta name="theme-color" content="#fafaf9" />
  <link rel="manifest" href="#" id="manifest-placeholder" />
  <title>PPL Tracker</title>
  <style>
    /* ── Theme tokens (light defaults) ── */
    :root {
      --bg:#fafaf9; --surface:#fff; --surface-2:#f7f7f5; --surface-3:#efefed;
      --text:#1a1a1a; --text-2:#555; --muted:#888; --muted-2:#aaa; --muted-3:#ccc;
      --border:#e8e8e6; --border-2:#e0e0de; --border-3:#f0f0ee;
      --btn-bg:#1a1a1a; --btn-fg:#fff;
      --tabbar-bg:rgba(255,255,255,.94); --shadow:rgba(0,0,0,.1);
      --good:#2d7a5a; --bad:#c0392b; --danger:#c0392b; --danger-bd:#f0c8c2;
      --link:#5a6aaa;
      --push-fg:#c0691f; --push-bg:#fdf1e6; --push-bd:#f0c79a; --push-bar:#e08a2e;
      --legs-fg:#2d7a5a; --legs-bg:#e8f4f0; --legs-bd:#9fd3bf; --legs-bar:#44a884;
      --pull-fg:#41549c; --pull-bg:#eef0fb; --pull-bd:#b9c2ef; --pull-bar:#5a6fcc;
      --badge-bg:#f0f0ee; --badge-fg:#555;
      --flag-fg:#1d7a4d; --flag-bg:#e3f6ec; --flag-bd:#a8e0c2;
      --warm-fg:#c0691f; --warm-bg:#fdf8f1; --warm-bd:#f0e2cc;
      --cardio-fg:#7a5aa8; --cardio-bg:#f2eefb; --cardio-bd:#cdbceb; --cardio-bar:#9a7ed0;
      --chart:#5a6fcc; --chart-axis:#bbb;
      --toast-bg:#1a1a1a; --toast-fg:#fff;
    }
    /* ── Dark theme: follows the phone's system setting ── */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#141417; --surface:#1e1e23; --surface-2:#26262c; --surface-3:#2a2a31;
        --text:#ececec; --text-2:#b8b8bd; --muted:#8c8c95; --muted-2:#6a6a74; --muted-3:#55555e;
        --border:#2d2d35; --border-2:#3a3a44; --border-3:#2a2a31;
        --btn-bg:#ececec; --btn-fg:#141417;
        --tabbar-bg:rgba(20,20,23,.9); --shadow:rgba(0,0,0,.4);
        --good:#5fd0a0; --bad:#ff6b5e; --danger:#ff6b5e; --danger-bd:rgba(255,107,94,.4);
        --link:#97a6f0;
        --push-fg:#f0a861; --push-bg:rgba(224,138,46,.16); --push-bd:rgba(224,138,46,.4); --push-bar:#e08a2e;
        --legs-fg:#6bd3a8; --legs-bg:rgba(68,168,132,.16); --legs-bd:rgba(68,168,132,.42); --legs-bar:#44a884;
        --pull-fg:#97a6f0; --pull-bg:rgba(90,111,204,.2); --pull-bd:rgba(90,111,204,.45); --pull-bar:#5a6fcc;
        --badge-bg:#2a2a31; --badge-fg:#b8b8bd;
        --flag-fg:#6bd3a8; --flag-bg:rgba(45,122,90,.2); --flag-bd:rgba(45,122,90,.45);
        --warm-fg:#f0a861; --warm-bg:rgba(224,138,46,.1); --warm-bd:rgba(224,138,46,.28);
        --cardio-fg:#c0a8f0; --cardio-bg:rgba(154,126,208,.18); --cardio-bd:rgba(154,126,208,.45); --cardio-bar:#9a7ed0;
        --chart:#8aa0ff; --chart-axis:#666;
        --toast-bg:#ececec; --toast-fg:#141417;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      -webkit-tap-highlight-color: transparent; padding-bottom: 72px;
    }
    .container { max-width: 520px; margin: 0 auto; padding: 20px 16px 24px; }
    h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; }
    h2 { font-size: 16px; font-weight: 700; margin: 18px 0 10px; }

    /* Cards */
    .card { background: var(--surface); border-radius: 12px; padding: 16px; border: 1px solid var(--border); margin-bottom: 12px; }
    .muted { color: var(--muted); font-size: 13px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }

    /* Buttons */
    button { font-family: inherit; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; padding: 11px 16px; background: var(--btn-bg); color: var(--btn-fg); transition: opacity .15s; }
    .btn:active { opacity: .7; }
    .btn-block { width: 100%; }
    .btn-ghost { background: var(--surface); color: var(--text); border: 1.5px solid var(--border-2); }
    .btn-sm { padding: 6px 11px; font-size: 12px; border-radius: 8px; }
    .btn-danger { background: var(--surface); color: var(--danger); border: 1.5px solid var(--danger-bd); }

    /* Workout accent chips */
    .pill { font-size: 11px; font-weight: 700; letter-spacing: .5px; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; display: inline-block; }
    .acc-push { color: var(--push-fg); background: var(--push-bg); border: 1.5px solid var(--push-bd); }
    .acc-legs { color: var(--legs-fg); background: var(--legs-bg); border: 1.5px solid var(--legs-bd); }
    .acc-pull { color: var(--pull-fg); background: var(--pull-bg); border: 1.5px solid var(--pull-bd); }
    .acc-bar-push { background: var(--push-bar); }
    .acc-bar-legs { background: var(--legs-bar); }
    .acc-bar-pull { background: var(--pull-bar); }

    .range-badge { font-size: 11px; font-weight: 700; color: var(--badge-fg); background: var(--badge-bg); border-radius: 6px; padding: 2px 8px; }
    .flag { font-size: 11px; font-weight: 700; color: var(--flag-fg); background: var(--flag-bg); border: 1px solid var(--flag-bd); border-radius: 6px; padding: 2px 8px; }

    /* Exercise log card */
    .ex-card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
    .ex-accent { height: 4px; }
    .ex-body { padding: 14px 14px 12px; }
    .ex-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .ex-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .ex-title { font-size: 14px; font-weight: 700; }
    .lasttime { font-size: 12px; color: var(--text-2); background: var(--surface-2); border-radius: 8px; padding: 7px 9px; margin: 6px 0 10px; line-height: 1.5; }
    .last-note { font-size: 12px; color: var(--warm-fg); background: var(--warm-bg); border: 1px solid var(--warm-bd); border-radius: 8px; padding: 7px 9px; margin: -4px 0 10px; line-height: 1.5; }
    select, input, textarea { font-family: inherit; font-size: 14px; border: 1.5px solid var(--border-2); border-radius: 8px; padding: 9px 10px; background: var(--surface); color: var(--text); width: 100%; }
    input[type=checkbox] { width: 20px; height: 20px; min-width: 20px; padding: 0; border: none; accent-color: #5a6fcc; }
    select:focus, input:focus, textarea:focus { outline: none; border-color: var(--text); }
    .set-grid { display: grid; grid-template-columns: 20px 1fr 1fr 16px 24px 24px; gap: 5px; align-items: center; margin-bottom: 7px; }
    .tgt-badge { font-size: 13px; font-weight: 800; text-align: center; line-height: 1; }
    .tgt-badge.beat { color: var(--good); }
    .tgt-badge.tie { color: var(--muted); }
    .coach { font-size: 12px; line-height: 1.5; border-radius: 8px; padding: 7px 10px; margin: 6px 0 10px; color: var(--text-2); }
    .coach.stall { background: var(--warm-bg); border: 1px solid var(--warm-bd); }
    .coach.deload { background: var(--pull-bg); border: 1px solid var(--pull-bd); }
    .coach-btn { background: none; border: none; color: var(--link); font-weight: 700; font-size: 12px; cursor: pointer; padding: 0; }
    .set-grid .set-no { font-size: 12px; font-weight: 700; color: var(--muted-2); text-align: center; }
    .set-grid input { padding: 8px 6px; text-align: center; }
    .set-grid .colhead { font-size: 10px; font-weight: 700; color: var(--muted-2); text-transform: uppercase; letter-spacing: .5px; text-align: center; }
    .x-set { background: none; border: none; color: var(--muted-3); font-size: 18px; cursor: pointer; line-height: 1; }
    .skip-set { background: none; border: none; color: var(--muted-2); font-size: 16px; cursor: pointer; line-height: 1; }
    .addset { font-size: 12px; font-weight: 600; color: var(--link); background: none; border: none; cursor: pointer; padding: 4px 0; }
    .skip-note { font-size: 12px; color: var(--muted); background: var(--surface-2); border-radius: 8px; padding: 7px 9px; margin-bottom: 7px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .skip-note em { font-style: italic; }
    .skip-note button { background: none; border: none; color: var(--link); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .timer-badge { font-variant-numeric: tabular-nums; font-weight: 700; font-size: 13px; color: var(--text); background: var(--surface-2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; white-space: nowrap; }
    .stair-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 6px 0 4px; }
    .stair-grid label { font-size: 10px; font-weight: 700; color: var(--muted-2); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 4px; }
    .acc-cardio { color: var(--cardio-fg); background: var(--cardio-bg); border: 1.5px solid var(--cardio-bd); }
    .acc-bar-cardio { background: var(--cardio-bar); }
    /* Summary */
    .stat-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 14px 0 12px; }
    .stat-tile { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 13px 8px; text-align: center; }
    .stat-tile .v { font-size: 21px; font-weight: 800; letter-spacing: -0.5px; }
    .stat-tile .k { font-size: 10px; font-weight: 700; color: var(--muted-2); text-transform: uppercase; letter-spacing: .4px; margin-top: 3px; }
    .wkbars { display: flex; align-items: flex-end; gap: 8px; height: 76px; }
    .wkbar { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
    .wkbar .bar { width: 100%; background: var(--chart); border-radius: 5px 5px 0 0; min-height: 3px; transition: height .2s; }
    .wkbar .lbl { font-size: 9px; color: var(--muted-2); font-weight: 600; }
    .wkbar .cnt { font-size: 10px; font-weight: 700; color: var(--text); min-height: 12px; }
    /* Skincare */
    .day-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .day-btn { padding: 7px 11px; border: 1.5px solid var(--border-2); border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; background: var(--surface); color: var(--text); position: relative; }
    .day-btn.active { background: var(--btn-bg); border-color: var(--btn-bg); color: var(--btn-fg); }
    .day-dot { position: absolute; top: -4px; right: -4px; width: 8px; height: 8px; border-radius: 50%; border: 2px solid var(--bg); }
    .dot-retinol { background: #5aaa8a; } .dot-bha { background: #8a7ac2; }
    .badge-row { display: flex; gap: 8px; margin: 14px 0 4px; flex-wrap: wrap; }
    .badge { font-size: 11px; font-weight: 700; letter-spacing: .5px; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; display: inline-block; }
    .badge-retinol { color: #2d7a5a; background: rgba(90,170,138,.16); border: 1.5px solid #5aaa8a; }
    .badge-bha { color: #6a5ab0; background: rgba(138,122,194,.16); border: 1.5px solid #8a7ac2; }
    .card-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; }
    .label-am { color: #c88a30; } .label-pm { color: #6a7ad0; }
    .skin-step { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border-3); font-size: 14px; }
    .skin-step:last-child { border-bottom: none; }
    .skin-num { min-width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; background: var(--surface-3); color: var(--text-2); }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .phase-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
    .phase-header { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border: none; background: transparent; cursor: pointer; text-align: left; color: var(--text); }
    .phase-num { width: 26px; height: 26px; border-radius: 8px; background: var(--btn-bg); color: var(--btn-fg); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .phase-title { font-size: 15px; font-weight: 600; }
    .phase-count { font-size: 12px; color: var(--muted-2); }
    .phase-body { padding: 0 16px 14px; }
    .phase-body p { font-size: 13px; color: var(--text-2); line-height: 1.55; margin-bottom: 8px; }
    .phase-body p:last-child { margin-bottom: 0; }
    .phase-body ul { margin: 0 0 8px 18px; }
    .phase-body li { font-size: 13px; color: var(--text-2); line-height: 1.5; margin-bottom: 4px; }
    .shave-step { padding: 10px 0; border-top: 1px solid var(--border-3); }
    .shave-step-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .shave-step-note { font-size: 13px; color: var(--text-2); line-height: 1.5; }

    /* Warmup */
    .warm { margin-top: 8px; }
    .warm-toggle { font-size: 12px; font-weight: 600; color: var(--warm-fg); background: none; border: none; cursor: pointer; padding: 2px 0; }
    .warm-table { margin-top: 6px; font-size: 12px; color: var(--text-2); background: var(--warm-bg); border: 1px solid var(--warm-bd); border-radius: 8px; padding: 8px 10px; }
    .warm-table div { display: flex; justify-content: space-between; padding: 2px 0; }

    /* Tab bar */
    .tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--tabbar-bg); backdrop-filter: blur(8px); border-top: 1px solid var(--border); display: flex; flex-direction: column; z-index: 50; }
    .tabbar-inner { max-width: 520px; margin: 0 auto; width: 100%; display: flex; }
    .stopwatch { max-width: 520px; margin: 0 auto; width: 100%; display: flex; align-items: center; gap: 10px; padding: 8px 16px; border-bottom: 1px solid var(--border); }
    .stopwatch .sw-label { font-size: 12px; font-weight: 700; color: var(--muted); white-space: nowrap; }
    .stopwatch .sw-time { font-variant-numeric: tabular-nums; font-weight: 800; font-size: 19px; transition: color .2s; }
    .stopwatch .sw-time.in { color: var(--good); }
    .stopwatch .sw-time.over { color: var(--push-fg); }
    .stopwatch .sw-target { flex: 1; font-size: 11px; font-weight: 700; color: var(--muted); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stopwatch .sw-target.in { color: var(--good); }
    .sw-btn { border: none; border-radius: 8px; padding: 7px 16px; font-size: 13px; font-weight: 700; cursor: pointer; background: var(--btn-bg); color: var(--btn-fg); }
    .sw-btn.sw-clear { background: var(--surface-3); color: var(--text); padding: 7px 12px; }
    body.sw-on { padding-bottom: 124px; }
    .tab { flex: 1; background: none; border: none; cursor: pointer; padding: 9px 0 10px; display: flex; flex-direction: column; align-items: center; gap: 2px; color: var(--muted-2); font-size: 10px; font-weight: 600; }
    .tab.active { color: var(--text); }
    .tab .ic { font-size: 19px; line-height: 1; }

    /* History */
    .hist-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border-3); cursor: pointer; }
    .hist-item:last-child { border-bottom: none; }
    .hist-detail { font-size: 13px; color: var(--text-2); line-height: 1.6; padding: 4px 0 10px; }

    /* Weight chart */
    .stat-big { font-size: 34px; font-weight: 800; letter-spacing: -1px; }
    .stat-sub { font-size: 13px; color: var(--muted); }
    .trend-up { color: var(--bad); } .trend-down { color: var(--good); } .trend-flat { color: var(--muted); }
    svg { display: block; width: 100%; }

    .empty { text-align: center; color: var(--muted-2); font-size: 13px; padding: 30px 10px; }
    .hidden { display: none !important; }
    .seg { display: flex; gap: 6px; background: var(--surface-3); border-radius: 10px; padding: 4px; margin-bottom: 14px; }
    .seg button { flex: 1; padding: 7px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; background: transparent; color: var(--muted); }
    .seg button.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px var(--shadow); }
    .toast { position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%); background: var(--toast-bg); color: var(--toast-fg); font-size: 13px; font-weight: 600; padding: 10px 18px; border-radius: 22px; z-index: 230; opacity: 0; transition: opacity .2s; pointer-events: none; }
    .toast.show { opacity: 1; }

    /* Floating idea/feedback button + capture sheet */
    .fab { position: fixed; right: 16px; bottom: 88px; width: 50px; height: 50px; border-radius: 50%; background: var(--btn-bg); color: var(--btn-fg); border: none; font-size: 22px; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 14px var(--shadow); z-index: 60; cursor: pointer; transition: bottom .2s, opacity .15s; }
    .fab:active { opacity: .7; }
    body.sw-on .fab { bottom: 140px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 210; display: none; align-items: flex-end; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal-card { background: var(--surface); width: 100%; max-width: 520px; border-radius: 16px 16px 0 0; padding: 18px 16px calc(16px + env(safe-area-inset-bottom)); max-height: 82vh; overflow-y: auto; }
    .idea-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border-3); }
    .idea-item:last-child { border-bottom: none; }
    .idea-item .txt { flex: 1; font-size: 14px; line-height: 1.45; }
    .idea-item.done .txt { text-decoration: line-through; color: var(--muted); }
  </style>
  <!-- Firebase (Auth + Firestore) for cross-device sync. Deferred so they never block boot;
       the app is fully functional offline / signed-out without them. -->
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="container" id="app"></div>

<div class="tabbar">
  <div class="stopwatch" id="stopwatch" style="display:none">
    <span class="sw-label">⏱ Rest</span>
    <span class="sw-time" id="sw-time">0:00</span>
    <span class="sw-target" id="sw-target"></span>
    <button class="sw-btn" id="sw-toggle" onclick="swToggle()">▶</button>
    <button class="sw-btn sw-clear" onclick="swClear()">Clear</button>
  </div>
  <div class="tabbar-inner" id="tabbar"><!-- generated from TABS registry --></div>
</div>

<div class="toast" id="toast"></div>

<button class="fab" id="idea-fab" onclick="openIdeas()" aria-label="Add an idea or feedback">💡</button>
<div class="modal-overlay" id="ideas-modal" onclick="if(event.target===this)closeIdeas()">
  <div class="modal-card">
    <div class="row" style="margin-bottom:12px"><h2 style="margin:0">💡 Ideas & feedback</h2><button class="sw-btn sw-clear" onclick="closeIdeas()">Close</button></div>
    <textarea id="idea-input" rows="3" placeholder="An idea, bug, or thing to tweak — jot it while it's fresh…" style="resize:vertical;line-height:1.5;min-height:64px"></textarea>
    <button class="btn btn-block" style="margin-top:10px" onclick="addIdea()">Add idea</button>
    <div class="row" style="margin:16px 0 4px"><span class="muted" id="idea-count" style="font-size:12px"></span><button class="btn btn-sm btn-ghost" onclick="copyIdeas()">⧉ Copy all</button></div>
    <div id="ideas-list"></div>
  </div>
</div>

<script>
/* ───────────────────────── PWA (inline manifest + SW) ───────────────────────── */
(function(){
  const icon = sz => `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 ${sz} ${sz}'%3E%3Crect width='${sz}' height='${sz}' rx='${sz*0.2}' fill='%231a1a1a'/%3E%3Ctext x='50%25' y='68%25' font-size='${sz*0.55}' text-anchor='middle'%3E💪%3C/text%3E%3C/svg%3E`;
  const manifest = { name:"PPL Tracker", short_name:"PPL", start_url:"./", display:"standalone", background_color:"#fafaf9", theme_color:"#fafaf9",
    icons:[{src:icon(192),sizes:"192x192",type:"image/svg+xml"},{src:icon(512),sizes:"512x512",type:"image/svg+xml"}] };
  document.getElementById('manifest-placeholder').href = URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'}));
  const sw = `
    const C='ppl-shell-v1';
    self.addEventListener('install',e=>{ e.waitUntil(caches.open(C).then(c=>c.addAll(['./','./index.html']).catch(()=>{}))); self.skipWaiting(); });
    self.addEventListener('activate',e=>{ e.waitUntil(self.clients.claim()); });

function exercisePRs(){
  const map={};
  DB.sessions.forEach(s=>{ if(s.skipped) return; sessionExercises(s).forEach(e=>{
    e.sets.forEach(x=>{ if(x.skipped) return; const v=e1rm(x.w,x.r); if(v>0 && (!map[e.name] || v>map[e.name].v)) map[e.name]={v, w:x.w, r:x.r, date:s.date}; }); }); });
  return Object.entries(map).map(([name,d])=>({name,...d})).sort((a,b)=>b.v-a.v);
}
/* Bodyweight exercises (weight-0 sets with reps) that aren't tracked as loaded lifts. */
function bwExercisesWithData(){
  const loaded=new Set(exercisesWithData()), set=new Set();
  DB.sessions.forEach(s=>{ if(s.skipped) return; sessionExercises(s).forEach(e=>{ if(loaded.has(e.name)) return;
    if(e.sets.some(x=>!x.skipped && x.r!=='' && (x.w===''||+x.w===0))) set.add(e.name); }); });
  return [...set].sort();
}
function bwSeries(name){
  const out=[];
  DB.sessions.forEach(s=>{ if(s.skipped) return; let total=0, has=false;
    sessionExercises(s).forEach(e=>{ if(e.name!==name) return; e.sets.forEach(x=>{ if(!x.skipped && x.r!==''){ total+=+x.r; has=true; } }); });
    if(has) out.push({date:s.date, value:total}); });
  return out;
}
/* Working sets per muscle in the current week (main slots' muscle + Abs/Forearms). */
function weeklySetsByMuscle(){
  const m=+monday(new Date()), counts={};
  const add=(mus,n)=>{ if(mus&&n) counts[mus]=(counts[mus]||0)+n; };
  DB.sessions.forEach(s=>{ if(s.skipped || +monday(new Date(s.date+'T00:00'))!==m) return;
    (s.entries||[]).forEach((e,idx)=>{ const sl=PROGRAM[s.workout]&&PROGRAM[s.workout].slots[idx]; add(sl&&sl.muscle, e.sets.filter(x=>!x.skipped && x.r!=='').length); });
    if(s.extras) ['abs','forearms'].forEach(w=>{ const e=s.extras[w]; if(e&&e.sets) add(w==='abs'?'Abs':'Forearms', e.sets.filter(x=>!x.skipped && x.r!=='').length); });
  });
  return counts;
}
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1600); }

/* ───────────────────────── Hobby suggester ───────────────────────── */
/* "Do something" picker — two lists: hobbies (fun) and productivity (chores). */
let pickCat='hobby';
let currentPick={ hobby:null, productivity:null };
function listFor(cat){ return (cat==='productivity'? DB.productivity : DB.hobbies) || []; }
function pickRandom(cat, exclude){ const l=listFor(cat); if(!l.length) return null; if(l.length===1) return l[0]; let h; do{ h=l[Math.floor(Math.random()*l.length)]; }while(h===exclude); return h; }
function setPickCat(c){ pickCat=c; if(!currentPick[c]) currentPick[c]=pickRandom(c); render(); }
function shufflePick(){ currentPick[pickCat]=pickRandom(pickCat, currentPick[pickCat]); render(); }
function selectPick(v){ currentPick[pickCat]=v; render(); }
function didPick(){ const item=currentPick[pickCat]; if(!item) return; DB.hobbyLog.push({date:todayISO(), item, cat:pickCat}); save(); confettiBurst(); toast('Nice — that counts. 🎉'); currentPick[pickCat]=pickRandom(pickCat, item); render(); }
function catWeekCount(cat){ const m=+monday(new Date()); return (DB.hobbyLog||[]).filter(h=> (h.cat||'hobby')===cat && +monday(new Date(h.date+'T00:00'))===m).length; }
function addItem(cat){ const inp=document.getElementById(cat+'-input'); const v=(inp.value||'').trim(); if(!v) return; listFor(cat).push(v); save(); toast('Added'); render(); }
function removeItem(cat,i){ listFor(cat).splice(i,1); if(currentPick[cat] && !listFor(cat).includes(currentPick[cat])) currentPick[cat]=pickRandom(cat); save(); render(); }

/* ───────────────────────── Daily journal ───────────────────────── */
function saveJournal(v){ const t=todayISO(); if(v.trim()==='') delete DB.journal[t]; else DB.journal[t]=v; save(); }
/* Edit any date's journal entry from Week in Review. saveJournalFor saves live without
   re-rendering (keeps textarea focus); open/close toggle the inline editor + refresh counts. */
let editJournalDate = null;
function saveJournalFor(iso,v){ if(v.trim()==='') delete DB.journal[iso]; else DB.journal[iso]=v; save(); }

function journalWeekCount(){ const m=+monday(new Date()); let c=0; for(const d in (DB.journal||{})){ if(DB.journal[d].trim() && +monday(new Date(d+'T00:00'))===m) c++; } return c; }
function logToJournal(line){ const d=todayISO(); DB.journal[d] = DB.journal[d] ? (DB.journal[d].replace(/\s+$/,'')+'\n'+line) : line; }

/* ───────────────────────── To-do list (rolls over until checked) ───────────────────────── */
function addTodo(){ const inp=document.getElementById('todo-input'); const v=(inp.value||'').trim(); if(!v) return; DB.todos.push({text:v, created:todayISO()}); save(); render(); const n=document.getElementById('todo-input'); if(n) n.focus(); }
function doneTodo(i){ const t=DB.todos[i]; if(!t) return; logToJournal('✓ '+fmtClock(Date.now())+' — '+t.text); DB.todos.splice(i,1); save(); toast('Logged to journal ✓'); render(); }
function removeTodo(i){ DB.todos.splice(i,1); save(); render(); }
function todoAge(created){ return Math.floor((Date.now()-new Date(created+'T00:00'))/86400000); }

/* ───────────────────────── Router — feature registry ─────────────────────────
   Each tab is ONE entry. Adding a feature = append one object here; the bottom
   bar, the router, and the sub-nav all generate from this list — no more
   four-site edits, and tab ids live in one place (kills the stale-string bugs). */
const TABS = [
  { id:'today', label:'Today', icon:'🏠', view:()=>viewToday() },
  { id:'train', label:'Train', icon:'🏋️', sub:[['log','Log'],['history','History'],['cardio','Cardio'],['progress','Progress']],
    view:sub => sub==='log' ? (DB.draft ? viewActive() : viewPicker()) : sub==='history' ? viewHistory() : sub==='cardio' ? viewCardio() : viewWeight(),
    onRender:sub => { if(sub==='progress') drawActiveChart(); } },
  { id:'care', label:'Care', icon:'✨', sub:[['skin','Skin'],['lawn','Lawn']],
    view:sub => sub==='skin' ? viewSkincare() : viewLawn(),
    onRender:sub => { if(sub==='lawn') maybeFetchWeather(); } },
  { id:'settings', label:'Settings', icon:'⚙️', view:()=>viewData() },
];
const tabDef = id => TABS.find(t=>t.id===id);
let TAB = TABS[0].id;
const subState = {};
TABS.forEach(t=>{ if(t.sub) subState[t.id]=t.sub[0][0]; });

function buildTabBar(){
  document.getElementById('tabbar').innerHTML = TABS.map(t=>
    `<button class="tab${t.id===TAB?' active':''}" data-tab="${t.id}" onclick="go('${t.id}')"><span class="ic">${t.icon}</span>${t.label}</button>`
  ).join('');
}
function syncTabBar(){ document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.dataset.tab===TAB)); }
function go(id){ if(!tabDef(id)) return; TAB=id; syncTabBar(); render(); window.scrollTo(0,0); }
/* Jump straight to a sub-view of a grouped tab, e.g. goSub('train','history'). */
function goSub(id, sub){ const t=tabDef(id); if(!t) return; if(t.sub && sub) subState[id]=sub; go(id); }
/* Switch sub-view within the CURRENT tab (used by the segmented control). */
function setSub(sub){ const t=tabDef(TAB); if(t && t.sub) subState[TAB]=sub; render(); window.scrollTo(0,0); }
function segNav(items, active){
  return `<div class="seg" style="margin-bottom:16px">${items.map(([k,label])=>`<button class="${k===active?'active':''}" onclick="setSub('${k}')">${label}</button>`).join('')}</div>`;
}
/* Whichever Progress chart is active — shared by render() and the theme-change redraw. */
function drawActiveChart(){ if(TAB==='train' && subState.train==='progress'){ if(progSub==='strength') drawStrengthChart(); else if(progSub==='body') drawChart(); } }

function render(){
  const el = document.getElementById('app');
  try {
    const t = tabDef(TAB) || TABS[0];
    const sub = t.sub ? subState[t.id] : null;
    el.innerHTML = (t.sub ? segNav(t.sub, sub) : '') + t.view(sub);
    if(t.onRender) t.onRender(sub);
  } catch(e){
    el.innerHTML = `<div class="card" style="margin-top:24px">
      <h2>Something broke on this screen</h2>
      <p class="muted" style="line-height:1.5;margin:8px 0">${esc(e && e.message || String(e))}</p>
      <p class="muted" style="margin-bottom:12px">Your data is safe — export a copy, then reload.</p>
      <button class="btn btn-block" onclick="exportData()">⬇ Export my data</button>
      <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="location.reload()">Reload app</button>
    </div>`;
  }
  if(typeof updateStopwatch==='function') updateStopwatch();
}

function wxGlance(){
  const wx=DB.wx; if(!wx||!wx.data) return null;
  const dy=wx.data.daily, cur=wx.data.current_weather;
  let ti=dy.time.indexOf(todayISO()); if(ti<0) ti=dy.time.length>1?1:0;
  const c=wxCode(cur?cur.weathercode:dy.weathercode[ti]);
  return { temp:Math.round(cur?cur.temperature:dy.temperature_2m_max[ti]), icon:c.icon, text:c.text,
    hi:Math.round(dy.temperature_2m_max[ti]), lo:Math.round(dy.temperature_2m_min[ti]),
    rainProb:Math.round(dy.precipitation_probability_max[ti]||0), loc:(DB.lawn&&DB.lawn.label)||'' };
}

function startWorkout(name){
  if(DB.draft && DB.draft.workout!==name){
    if(!confirm(`You have an unfinished ${DB.draft.workout}. Discard it and start ${name}?`)) return;
  }
  if(!DB.draft || DB.draft.workout!==name){
    DB.draft = { workout:name, date:todayISO(), startedAt:Date.now(),
      entries: PROGRAM[name].slots.map((s,i)=>{
        const ref = lastRealEntry(name,i);
        const exName = ref? ref.entry.name : s.examples[0];
        const aw = addWeightInfo(s, ref, exName);
        const real = ref? ref.entry.sets.filter(x=>!x.skipped && x.r!=='') : [];
        return { name: exName, note:'', sets: Array.from({length:s.sets},(_,k)=>{
          let w='';
          if(aw) w = (aw.allTop && aw.hasLoad) ? String(aw.newW) : (real[k]? real[k].w : (real.length? real[real.length-1].w : ''));
          return { w, r:'', skipped:false, reason:'' };
        }) };
      }),
      stairs: { level:'', seconds:'', skipped:false, reason:'' },
      extras: blankExtras(), sessionNote:''
    };
    const ls = lastRealStairs();
    if(ls){ DB.draft.stairs.seconds = String((+ls.st.seconds)+15); DB.draft.stairs.level = String(ls.st.level||''); }
    save();
  }
  goSub('train','log');
}
function skipDay(name){
  const reason = prompt(`Skip ${name} entirely? Add a reason (optional):`, '');
  if(reason===null) return;
  DB.sessions.push({ workout:name, date:todayISO(), skipped:true, reason:reason.trim(), entries:[], stairs:null, durationMin:null });
  sortSessions(); save(); toast(`${name} skipped`);
  go('today');
}
function startBackdate(name){
  if(DB.draft && !confirm(`You have an unfinished ${DB.draft.workout}. Discard it?`)) return;
  DB.draft = { workout:name, date:todayISO(), historical:true, startedAt:null, durationMin:'',
    entries: PROGRAM[name].slots.map((s,i)=>{ const ref=lastRealEntry(name,i); return { name: ref?ref.entry.name:s.examples[0], note:'', sets: Array.from({length:s.sets},()=>({w:'',r:'',skipped:false,reason:''})) }; }),
    stairs:{ level:'', seconds:'', skipped:false, reason:'' }, extras: blankExtras(), sessionNote:'' };
  const ls=lastRealStairs(); if(ls){ DB.draft.stairs.seconds=String((+ls.st.seconds)+15); DB.draft.stairs.level=String(ls.st.level||''); }

}

/* ───────────────────────── WORKOUT — active session ───────────────────────── */
function viewActive(){
  const name = DB.draft.workout, g = PROGRAM[name].group;
  const slots = PROGRAM[name].slots;
  const cards = slots.map((s,i)=>{
    const entry = DB.draft.entries[i];

    const rng = effRange(s, entry.name);

      lastLine = `Last time (${fmtDate(ref.date)}): <strong>${real.map(x=> fmtSet(x.w,x.r)).join(',  ')||'—'}</strong>`;

    return `<div class="ex-card">

        ${setRows}
        <button class="addset" onclick="addSet(${i})">+ Add set</button>
        ${i===0?`<div class="warm">

        </div>`:''}
        <input type="text" placeholder="Note — pain, tempo, how it felt…" value="${esc(entry.note||'')}" oninput="setNote(${i},this.value)" style="margin-top:10px;font-size:13px;padding:7px 9px">
      </div>

  }).join('');

  // ── Stair Stepper finisher ──
  const st = DB.draft.stairs, ls = lastRealStairs();
  const stTotal=+(st.seconds||0);
  const stMin = (st.seconds!=='' && st.seconds!=null) ? Math.floor(stTotal/60) : '';
  const stSec = (st.seconds!=='' && st.seconds!=null) ? stTotal%60 : '';
  const stairLast = ls
    ? `Last: level <strong>${esc(String(ls.st.level||'—'))}</strong>, ${fmtMS(ls.st.seconds)} — target <strong>${fmtMS(+ls.st.seconds+15)}</strong> (+15s)`
    : `First time — set your starting point. You'll go up 15s each session.`;
  const stairsCard = st.skipped
    ? `<div class="ex-card"><div class="ex-accent acc-bar-cardio"></div><div class="ex-body">
        <div class="skip-note" style="margin:0"><span>⤼ Stair stepper skipped${st.reason?': <em>'+esc(st.reason)+'</em>':''}</span><button onclick="unskipStairs()">Undo</button></div>

    : `<div class="ex-card"><div class="ex-accent acc-bar-cardio"></div><div class="ex-body">

          <div><label>Min</label><input type="number" inputmode="numeric" placeholder="min" value="${stMin}" oninput="stairTimeSet('m',this.value)"></div>

      </div></div>`;

  const lblCss = 'font-size:10px;font-weight:700;color:var(--muted-2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px';
  const header = DB.draft.historical
    ? `<div>
        <h1><span class="pill ${accClass(g)}">${name}</span> <span class="muted" style="font-size:13px">· past entry</span></h1>
        <div class="stair-grid" style="margin-top:10px">
          <div><label style="${lblCss}">Date</label><input type="date" value="${DB.draft.date}" max="${todayISO()}" oninput="setDraftDate(this.value)"></div>
          <div><label style="${lblCss}">Minutes at gym (opt)</label><input type="number" inputmode="numeric" placeholder="min" value="${DB.draft.durationMin||''}" oninput="setDraftDur(this.value)"></div>

    : `<div class="row" style="align-items:flex-start">
        <div>
          <h1><span class="pill ${accClass(g)}">${name}</span></h1>
          <p class="subtitle">${fmtDate(DB.draft.date)} · beat last by ≥1 rep</p>
        </div>
        <span class="timer-badge" id="session-timer">${fmtDur(Date.now()-(DB.draft.startedAt||Date.now()))}</span>
      </div>`;
  const acc = accessoryBlocks(g);
  return `
    ${header}
    <div style="margin-top:16px">${acc.warm}${cards}${acc.lifts}${stairsCard}${acc.cooldown}</div>
    <div class="card">
      <div class="muted" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Session note</div>
      <textarea id="session-note" rows="2" placeholder="How did the session feel? Overall notes…" oninput="setSessionNote(this.value)" style="resize:vertical;line-height:1.5;min-height:56px">${esc(DB.draft.sessionNote||'')}</textarea>
    </div>
    <button class="btn btn-block" style="margin-top:6px" onclick="finishWorkout()">${DB.draft.historical?'Save past workout':'Finish & save workout'}</button>
    <button class="btn btn-danger btn-block" style="margin-top:10px" onclick="discardWorkout()">Discard</button>`;
}
function setDraftDate(v){ DB.draft.date=v; save(); }
function setDraftDur(v){ DB.draft.durationMin=v; save(); }

function pickEx(i, sel){
  if(sel.value==='__custom'){ const v=prompt('Exercise name:', DB.draft.entries[i].name); if(v){DB.draft.entries[i].name=v.trim();} save(); render(); return; }
  DB.draft.entries[i].name = sel.value; save(); render();
}
function setVal(i,k,f,v){ DB.draft.entries[i].sets[k][f]=v; if(f==='r' && v!=='') restCtx=restTargetForSlot(i); save(); /* live save, no re-render to keep focus */ }
function setNote(i,v){ DB.draft.entries[i].note=v; save(); }
function setSessionNote(v){ DB.draft.sessionNote=v; save(); }
/* Roll the WEIGHT down into still-empty sets below. Fired on `change` (after the full
   number is entered), weight only — reps are never rolled. Filled cells stay untouched. */
function rollWeight(i,k,value){
  const sets=DB.draft.entries[i].sets;
  sets[k].w=value;
  if(value!==''){
    for(let j=k+1;j<sets.length;j++){
      if(sets[j].skipped) continue;
      if(sets[j].w===''){ sets[j].w=value; const el=document.getElementById(`w-${i}-${j}`); if(el) el.value=value; }
    }
  }
  save();
}
function addSet(i){ DB.draft.entries[i].sets.push({w:'',r:'',skipped:false,reason:''}); save(); render(); }
function rmSet(i,k){ if(DB.draft.entries[i].sets.length<=1)return; DB.draft.entries[i].sets.splice(k,1); save(); render(); }
function skipSet(i,k){
  const reason = prompt(`Why skipping set ${k+1}? (optional)`, '');
  if(reason===null) return;
  const st = DB.draft.entries[i].sets[k]; st.skipped=true; st.reason=reason.trim(); st.w=''; st.r='';
  save(); render();
}
function unskipSet(i,k){ const st=DB.draft.entries[i].sets[k]; st.skipped=false; st.reason=''; save(); render(); }
function stairVal(f,v){ DB.draft.stairs[f]=v; save(); }
function stairTimeSet(part,v){
  const cur=+(DB.draft.stairs.seconds||0); let m=Math.floor(cur/60), s=cur%60;
  if(part==='m') m=Math.max(0,parseInt(v)||0); else s=Math.max(0,parseInt(v)||0);
  DB.draft.stairs.seconds=String(m*60+s); save();
}
/* Fire confetti when a set reaches the top of its rep range (the "level up" signal). */
function repCheck(i,k){
  const set=DB.draft.entries[i].sets[k]; if(set.skipped) return;
  const rng=effRange(PROGRAM[DB.draft.workout].slots[i], DB.draft.entries[i].name);
  if(set.r!==''){ restCtx=restTargetFor(rng.hi); sw.acc=0; sw.start=Date.now(); sw.running=true; updateStopwatch(); } // committing a set starts the rest clock for that exercise
  if(set.r!=='' && +set.r>=rng.hi){ if(!set._cel){ set._cel=true; save(); confettiBurst(); toast('💥 Top of the range!'); } }
  else if(set._cel){ set._cel=false; save(); }
}
function confettiBurst(){
  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:999';
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d'), dpr=window.devicePixelRatio||1;
  canvas.width=innerWidth*dpr; canvas.height=innerHeight*dpr; ctx.scale(dpr,dpr);
  const colors=['#e08a2e','#44a884','#5a6fcc','#9a7ed0','#e0c14e','#e0567a'];
  const parts=[];
  for(let i=0;i<100;i++) parts.push({ x:innerWidth/2, y:innerHeight*0.30, vx:(Math.random()-0.5)*11, vy:Math.random()*-10-3, g:0.28+Math.random()*0.12, rot:Math.random()*6.28, vr:(Math.random()-0.5)*0.4, size:5+Math.random()*6, color:colors[i%colors.length], life:1 });
  let t=0;
  (function frame(){ t++; ctx.clearRect(0,0,innerWidth,innerHeight); let alive=false;
    parts.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life-=0.011;
      if(p.life>0 && p.y<innerHeight+30){ alive=true; ctx.save(); ctx.globalAlpha=Math.max(0,p.life); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.color; ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6); ctx.restore(); } });
    if(alive && t<220) requestAnimationFrame(frame); else canvas.remove();
  })();
}
function skipStairs(){ const reason=prompt('Why skipping the stair stepper? (optional)',''); if(reason===null)return; DB.draft.stairs.skipped=true; DB.draft.stairs.reason=reason.trim(); save(); render(); }
function unskipStairs(){ DB.draft.stairs.skipped=false; DB.draft.stairs.reason=''; save(); render(); }
function toggleWarm(i){
  const box = document.getElementById('warm-'+i); box.classList.toggle('hidden');
  if(box.classList.contains('hidden')) return;
  const sets = DB.draft.entries[i].sets;
  const w = Math.max(...sets.map(s=> +s.w || 0), 0);
  if(!w){ box.innerHTML = `<div><span>Enter a working weight first</span></div>`; return; }
  box.innerHTML = `
    <div><span>Empty bar / light</span><span>a few reps</span></div>
    <div><span>~50% — ${round5(w*0.5)} ${DB.unit}</span><span>3–4 reps</span></div>
    <div><span>~75% — ${round5(w*0.75)} ${DB.unit}</span><span>2–3 reps</span></div>
    <div><span><strong>Working — ${w} ${DB.unit}</strong></span><span>per plan</span></div>`;
}
function finishWorkout(){
  const d = DB.draft;
  // A set counts as WORKED iff reps are entered (pre-filled weight alone is not data).
  const hasEx = d.entries.some(e=> e.sets.some(s=> s.skipped || s.r!==''));
  const hasStairs = d.stairs && (d.stairs.skipped || d.stairs.seconds!=='');
  const x = d.extras || blankExtras();
  const hasExtra = ['abs','forearms'].some(w=> x[w].sets.some(s=> s.r!==''));
  if(!hasEx && !hasStairs && !hasExtra){ alert('Log at least one set (with reps) before saving.'); return; }
  // keep skipped sets (they carry a reason); drop sets with no reps (incl. pre-filled-weight-only)
  d.entries.forEach(e=>{ e.sets = e.sets.filter(s=> s.skipped || s.r!==''); e.sets.forEach(s=>delete s._cel); });
  ['abs','forearms'].forEach(w=>{ x[w].sets = x[w].sets.filter(s=> s.r!==''); });
  const endedAt = Date.now(), hist = d.historical;
  const prior = hist ? {} : Object.fromEntries(exercisePRs().map(p=>[p.name,p.v]));
  const sess = {
    workout:d.workout, date:d.date,
    startedAt: hist ? null : (d.startedAt||null),
    endedAt: hist ? null : endedAt,
    durationMin: hist ? (d.durationMin? +d.durationMin : null)
                      : (d.startedAt ? Math.max(1, Math.round((endedAt-d.startedAt)/60000)) : null),
    entries:d.entries, stairs:d.stairs, extras:x, note:(d.sessionNote||'').trim()
  };
  // PR detection: an exercise whose best e1RM this session beats its prior all-time best
  let prs=[];
  if(!hist){
    sessionExercises(sess).forEach(e=>{ let best=0; e.sets.forEach(z=>{ if(!z.skipped){ const v=e1rm(z.w,z.r); if(v>best) best=v; } });
      if(best>0 && best>(prior[e.name]||0)) prs.push({name:e.name, v:Math.round(best), prev:Math.round(prior[e.name]||0)}); });
    if(prs.length) sess.prs = prs.map(p=>p.name);
  }
  DB.sessions.push(sess);
  sortSessions();
  DB.draft = null; save();
  if(prs.length){ confettiBurst(); toast(prs.length===1 ? `🏆 PR! ${prs[0].name} ${prs[0].prev||'—'}→${prs[0].v}` : `🏆 ${prs.length} PRs this session!`); }
  else toast(hist?'Past workout added':'Workout saved 💪');
  goSub('train','history');
}
function sortSessions(){ DB.sessions.sort((a,b)=> a.date===b.date ? ((a.endedAt||0)-(b.endedAt||0)) : a.date.localeCompare(b.date)); }
function discardWorkout(){ if(confirm('Discard this workout? Logged sets will be lost.')){ DB.draft=null; save(); goSub('train','log'); } }

/* ───────────────────────── HISTORY ───────────────────────── */
let openHist = -1, showBackdate = false, reviewWeekOffset = 0;
function weekShift(d){ reviewWeekOffset = Math.min(0, reviewWeekOffset + d); render(); }
/* Week in review — merges logged workouts/hobbies/weigh-ins with the daily journal note. */
function renderWeekReview(){
  const base = monday(new Date()); base.setDate(base.getDate() + reviewWeekOffset*7);
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const today = todayISO();
  let nW=0, nH=0, nJ=0;
  const rows = days.map((dn,di)=>{
    const dt = new Date(base); dt.setDate(dt.getDate()+di);
    const iso = dt.toLocaleDateString('en-CA');
    const future = iso > today;
    const sess = DB.sessions.filter(s=>s.date===iso);
    const hb = (DB.hobbyLog||[]).filter(h=>h.date===iso).map(h=>h.item||h.hobby);
    const wt = DB.weights.find(x=>x.date===iso);
    const note = (DB.journal||{})[iso];
    nW += sess.filter(s=>!s.skipped).length; nH += hb.length; if(note && note.trim()) nJ++;
    const tags = [];
    sess.forEach(s=> s.skipped
      ? tags.push(`<span class="muted" style="font-size:11px">⤼ skipped ${s.workout}</span>`)
      : tags.push(`<span class="pill ${accClass(PROGRAM[s.workout]?PROGRAM[s.workout].group:'push')}" style="font-size:9px;padding:2px 7px">${s.workout}</span>`));
    hb.forEach(h=> tags.push(`<span style="font-size:11px">🎲 ${esc(h)}</span>`));
    if(wt) tags.push(`<span style="font-size:11px">⚖️ ${(+wt.value).toFixed(1)}</span>`);
    if(dayComplete(iso)) tags.push(`<span style="font-size:11px">🧎 ${hasMobSession(iso)?'session':mobDoneOn(iso)}</span>`);
    if(sess.some(s=>s.prs&&s.prs.length)) tags.push(`<span style="font-size:11px">🏆 PR</span>`);
    const hasNote = note && note.trim();
    const editLink = iso => `<a onclick="editJournal('${iso}')" style="color:var(--link);cursor:pointer;font-size:12px;font-weight:600">✏️ ${hasNote?'Edit note':'Add note'}</a>`;
    let noteHTML;
    if(future){ noteHTML=''; }
    else if(editJournalDate===iso){
      noteHTML = `<div style="margin-top:6px">
        <textarea id="journal-edit-${iso}" rows="3" placeholder="What did you do on this day?" oninput="saveJournalFor('${iso}',this.value)" style="resize:vertical;line-height:1.5;min-height:64px;font-size:13px">${esc(note||'')}</textarea>
        <button class="btn btn-sm" style="margin-top:6px" onclick="closeJournalEdit()">Done</button>
      </div>`;
    } else {
      noteHTML = `${hasNote?`<div style="font-size:13px;color:var(--text-2);line-height:1.5;margin-top:6px;white-space:pre-wrap">${esc(note)}</div>`:''}
        <div style="margin-top:${hasNote?4:3}px">${editLink(iso)}</div>`;
    }
    return `<div style="padding:9px 0;border-bottom:1px solid var(--border-3)">
      <span style="font-weight:700;font-size:13px">${dn} ${dt.getMonth()+1}/${dt.getDate()}${iso===today?' · today':''}</span>
      ${tags.length?`<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:5px">${tags.join('')}</div>`:''}
      ${noteHTML}
    </div>`;
  }).join('');
  const end = new Date(base); end.setDate(end.getDate()+6);
  const label = `${base.getMonth()+1}/${base.getDate()} – ${end.getMonth()+1}/${end.getDate()}`;
  const title = reviewWeekOffset===0?'This week':reviewWeekOffset===-1?'Last week':`${-reviewWeekOffset} weeks ago`;
  return `<div class="card">
    <div class="row" style="margin-bottom:10px">
      <button class="btn btn-ghost btn-sm" onclick="weekShift(-1)">◀</button>
      <div style="text-align:center"><div style="font-weight:700">${title}</div><div class="muted" style="font-size:11px">${label}</div></div>
      <button class="btn btn-ghost btn-sm" onclick="weekShift(1)" ${reviewWeekOffset>=0?'disabled style="opacity:.35"':''}>▶</button>
    </div>
    <div class="muted" style="font-size:12px;margin-bottom:4px">${nW} workout${nW!==1?'s':''} · ${nH} activit${nH!==1?'ies':'y'} · journaled ${nJ}/7</div>
    ${rows}
  </div>`;
}
function toggleBackdate(){ showBackdate=!showBackdate; render(); }
function fmtSeconds(t){ if(!t) return '0s'; const h=Math.floor(t/3600),m=Math.floor(t%3600/60),s=t%60; if(h) return `${h}h ${m}m`; if(m) return `${m}m${s?' '+s+'s':''}`; return `${s}s`; }
function monday(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function renderSummary(){
  const done = DB.sessions.filter(s=>!s.skipped);
  if(!done.length) return '';
  const thisMon = monday(new Date());
  const weeks=[];
  for(let i=5;i>=0;i--){ const ws=new Date(thisMon); ws.setDate(ws.getDate()-i*7); weeks.push({start:ws, count:0}); }
  done.forEach(s=>{ const ws=+monday(new Date(s.date+'T00:00')); const w=weeks.find(w=>+w.start===ws); if(w) w.count++; });
  const thisWeek = weeks[weeks.length-1].count;
  const durs = done.filter(s=>s.durationMin).map(s=>s.durationMin);
  const avg = durs.length? Math.round(durs.reduce((a,b)=>a+b,0)/durs.length) : null;
  const stairTotal = done.reduce((a,s)=> a + (s.stairs && !s.stairs.skipped && s.stairs.seconds? +s.stairs.seconds:0), 0);
  const maxc = Math.max(1, ...weeks.map(w=>w.count));
  const bars = weeks.map(w=>`<div class="wkbar"><span class="cnt">${w.count||''}</span><div class="bar" style="height:${w.count?Math.round(w.count/maxc*100):0}%"></div><span class="lbl">${(w.start.getMonth()+1)}/${w.start.getDate()}</span></div>`).join('');

/* 7-day rolling average — smooths daily water-weight noise into the real signal.
   For each weigh-in date, average every entry in the trailing 7 days. */
function rollingAvgSeries(){
  const ws = DB.weights.slice().sort((a,b)=>a.date.localeCompare(b.date));
  return ws.map(w=>{
    const end=new Date(w.date+'T00:00'), start=new Date(end); start.setDate(start.getDate()-6);
    const win=ws.filter(x=>{ const d=new Date(x.date+'T00:00'); return d>=start && d<=end; });
    return { date:w.date, value: win.reduce((a,x)=>a+ +x.value,0)/win.length };
  });
}
function currentAvg(){ const s=rollingAvgSeries(); return s.length? s[s.length-1].value : null; }
function avgWeekDelta(){
  const s=rollingAvgSeries(); if(s.length<2) return null;
  const cur=s[s.length-1], target=new Date(cur.date+'T00:00'); target.setDate(target.getDate()-7);
  let prev=null; for(let i=s.length-2;i>=0;i--){ if(new Date(s[i].date+'T00:00')<=target){ prev=s[i]; break; } }
  return prev ? cur.value-prev.value : null; // only once there's ~a week of history
}

}

function paintChart(svg, pts, emptyMsg, gradId){
  const cs = getComputedStyle(document.documentElement);
  const C = cs.getPropertyValue('--chart').trim() || '#5a6fcc';
  const AX = cs.getPropertyValue('--chart-axis').trim() || '#bbb';
  if(pts.length<2){ svg.innerHTML = `<text x="160" y="78" text-anchor="middle" fill="${AX}" font-size="11">${emptyMsg||'Need 2+ entries to draw a trend'}</text>`; return; }
  const vals = pts.map(p=>+p.value), min=Math.min(...vals), max=Math.max(...vals);
  const pad = (max-min)*0.15 || 1, lo=min-pad, hi=max+pad;
  const W=320,H=150,mL=4,mR=4,mT=12,mB=14;
  const x = i => mL + i*(W-mL-mR)/(pts.length-1);
  const y = v => mT + (1-(v-lo)/(hi-lo))*(H-mT-mB);
  const line = pts.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)},${y(+p.value).toFixed(1)}`).join(' ');
  const area = `M${x(0)},${H-mB} `+pts.map((p,i)=>`L${x(i).toFixed(1)},${y(+p.value).toFixed(1)}`).join(' ')+` L${x(pts.length-1)},${H-mB} Z`;
  const dots = pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(+p.value).toFixed(1)}" r="2.5" fill="${C}"/>`).join('');
  const gid = gradId||'g';
  svg.innerHTML = `
    <defs><linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="${C}" stop-opacity="0.18"/><stop offset="1" stop-color="${C}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${C}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
    <text x="${mL}" y="9" fill="${AX}" font-size="9">${hi.toFixed(0)}</text>
    <text x="${mL}" y="${H-3}" fill="${AX}" font-size="9">${lo.toFixed(0)}</text>`;
}

const MOB_STRICT_FROM = '2026-07-07';

function exRoll(which,k,v){ const sets=DB.draft.extras[which].sets; sets[k].w=v; if(v!==''){ for(let j=k+1;j<sets.length;j++){ if(sets[j].w===''){ sets[j].w=v; const el=document.getElementById(`ex-${which}-w-${j}`); if(el) el.value=v; } } } save(); }
function exAddSet(which){ DB.draft.extras[which].sets.push({w:'',r:'',skipped:false}); save(); render(); }
function exRmSet(which,k){ const s=DB.draft.extras[which].sets; if(s.length<=1) return; s.splice(k,1); save(); render(); }
/* Mobility is a DAILY log (DB.mobilityLog[date]), not per-session — APT work is daily. */
function mobToday(){ const t=todayISO(); return (DB.mobilityLog && DB.mobilityLog[t]) || {}; }
function toggleMobility(i){ const t=todayISO(); if(!DB.mobilityLog) DB.mobilityLog={}; if(!DB.mobilityLog[t]) DB.mobilityLog[t]={}; const name=MOBILITY[i].n, m=DB.mobilityLog[t]; if(m[name]) delete m[name]; else m[name]=true; if(!Object.keys(m).length) delete DB.mobilityLog[t]; save(); render(); }
/* Log (or clear) a full yoga / mobility session for today — satisfies the day on its own. */
function toggleMobSession(){ const t=todayISO(); if(!DB.mobilityLog) DB.mobilityLog={}; if(!DB.mobilityLog[t]) DB.mobilityLog[t]={}; const m=DB.mobilityLog[t]; if(m.__session) delete m.__session; else m.__session='yoga'; if(!Object.keys(m).length) delete DB.mobilityLog[t]; save(); render(); }

function mobDoneOn(iso){ const e=mobEntry(iso); return Object.keys(e).filter(k=>!isReservedMobKey(k) && e[k]).length; }

/* ───────────────────────── LAWN & WEATHER (Open-Meteo, no API key) ───────────────────────── */
let weatherFetching=false;
function wxCode(c){ c=+c;
  if(c===0) return {icon:'☀️',text:'Clear'};
  if(c<=2) return {icon:'🌤️',text:'Mostly clear'};
  if(c===3) return {icon:'☁️',text:'Overcast'};
  if(c<=48) return {icon:'🌫️',text:'Fog'};
  if(c<=57) return {icon:'🌦️',text:'Drizzle'};
  if(c<=67) return {icon:'🌧️',text:'Rain'};
  if(c<=77) return {icon:'❄️',text:'Snow'};
  if(c<=82) return {icon:'🌦️',text:'Showers'};
  if(c<=86) return {icon:'❄️',text:'Snow showers'};
  return {icon:'⛈️',text:'Thunderstorm'};
}
async function fetchWeather(){
  if(!DB.lawn || DB.lawn.lat==null || weatherFetching) return;
  weatherFetching=true; render();
  try{
    const {lat,lon}=DB.lawn;
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,windspeed_10m_max&temperature_unit=fahrenheit&windspeed_unit=mph&precipitation_unit=inch&timezone=auto&past_days=1&forecast_days=7`;
    const r=await fetch(url); if(!r.ok) throw 0;
    DB.wx={ at:Date.now(), lat, lon, data:await r.json() }; save();
  }catch(e){ /* keep last cached result */ }
  weatherFetching=false; render();
}
function maybeFetchWeather(){
  if(!DB.lawn || DB.lawn.lat==null || weatherFetching) return; // only called from the Care/Lawn onRender
  const wx=DB.wx, stale = !wx || (Date.now()-wx.at>3600000) || wx.lat!==DB.lawn.lat || wx.lon!==DB.lawn.lon;
  if(stale) fetchWeather();
}
function useMyLocation(){
  const msg=document.getElementById('loc-msg'); if(msg) msg.textContent='Getting your location…';
  if(!navigator.geolocation){ if(msg) msg.textContent='Geolocation not available — type a town instead.'; return; }
  navigator.geolocation.getCurrentPosition(p=>{
    DB.lawn={ lat:+p.coords.latitude.toFixed(4), lon:+p.coords.longitude.toFixed(4), label:'My location' }; DB.wx=null; save(); fetchWeather();
  }, err=>{ if(msg) msg.textContent='Couldn’t get location ('+err.message+'). Type a town instead.'; });
}
async function geocodeTry(q){ try{ const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=en&format=json`); const d=await r.json(); return (d.results && d.results[0]) || null; }catch(e){ return null; } }
async function searchLocation(){
  const inp=document.getElementById('loc-input'); const q=(inp.value||'').trim(); if(!q) return;
  const msg=document.getElementById('loc-msg'); if(msg) msg.textContent='Searching…';
  // the geocoder wants just a city name — fall back by stripping a trailing state ("Madison, WI" / "Madison WI" → "Madison")
  let g=await geocodeTry(q);
  if(!g && q.includes(',')) g=await geocodeTry(q.split(',')[0].trim());
  if(!g){ const parts=q.replace(/,/g,' ').trim().split(/\s+/); if(parts.length>1 && parts[parts.length-1].length===2) g=await geocodeTry(parts.slice(0,-1).join(' ')); }
  if(!g){ if(msg) msg.textContent='No match — try just the city name, e.g. “Madison”.'; return; }
  DB.lawn={ lat:+g.latitude.toFixed(4), lon:+g.longitude.toFixed(4), label:`${g.name}${g.admin1?', '+g.admin1:''}` }; DB.wx=null; save(); fetchWeather();
}

function viewLawn(){
  if(!DB.lawn || DB.lawn.lat==null) return lawnSetup();
  const locBar=`<div class="row" style="margin-bottom:14px"><span class="muted">📍 ${esc(DB.lawn.label||'My location')}</span><button class="btn btn-sm btn-ghost" onclick="changeLawnLoc()">Change</button></div>`;
  const wx=DB.wx;
  if(!wx || !wx.data) return `<h1>Lawn & Weather</h1>${locBar}<div class="empty">${weatherFetching?'Loading weather…':'<button class="btn btn-sm" onclick="fetchWeather()">Load weather</button>'}</div>`;
  const d=wx.data, dy=d.daily, cur=d.current_weather, num=v=>(v==null?0:+v);
  const times=dy.time, today=todayISO();
  let ti=times.indexOf(today); if(ti<0) ti=times.length>1?1:0;
  const P=dy.precipitation_sum, PP=dy.precipitation_probability_max, HI=dy.temperature_2m_max, LO=dy.temperature_2m_min, WC=dy.weathercode;
  const dayLabel=(k,idx)=> k===0?'today':k===1?'tomorrow':new Date(times[idx]+'T00:00').toLocaleDateString('en-US',{weekday:'long'});
  const cw=wxCode(cur?cur.weathercode:WC[ti]);
  const strip=times.slice(ti,ti+7).map((t,k)=>{ const idx=ti+k, c=wxCode(WC[idx]);
    return `<div style="text-align:center;flex:1;min-width:42px">
      <div class="muted" style="font-size:10px;font-weight:700">${k===0?'Today':new Date(t+'T00:00').toLocaleDateString('en-US',{weekday:'short'})}</div>
      <div style="font-size:18px;margin:3px 0">${c.icon}</div>
      <div style="font-size:11px;font-weight:700">${Math.round(num(HI[idx]))}°</div>
      <div class="muted" style="font-size:10px">${Math.round(num(LO[idx]))}°</div>
      <div style="font-size:10px;color:var(--chart);min-height:13px">${num(PP[idx])>=20?num(PP[idx])+'%':''}</div>
    </div>`;
  }).join('');
  const recent=num(P[ti-1])+num(P[ti]), next2=num(P[ti+1])+num(P[ti+2]);
  let rainTxt='No significant rain in the 7-day forecast.';
  for(let k=0;k<7;k++){ const idx=ti+k; if(num(PP[idx])>=50 || num(P[idx])>=0.1){ rainTxt=`Rain likely <strong>${dayLabel(k,idx)}</strong>${num(PP[idx])?` (${num(PP[idx])}% chance, ~${num(P[idx]).toFixed(2)}")`:''}.`; break; } }
  let water;
  if(recent+next2>=0.5) water=`Skip it — about ${(recent+next2).toFixed(1)}" of rain around now should cover the lawn.`;
  else if(num(HI[ti])>=85) water=`Water early morning — hot and dry, with little rain coming.`;
  else water=`Light watering if the soil's dry — only ~${(recent+next2).toFixed(2)}" of rain expected.`;
  const mow=(num(P[ti])<0.1 && num(P[ti-1])<0.3) ? `Good day to mow — grass should be dry.` : `Hold off — grass is likely wet from recent rain. Mow once it dries out.`;
  let fert, lightK=-1, heavy=false;
  for(let k=1;k<=3;k++){ const s=num(P[ti+k]); if(s>0.8) heavy=true; if(lightK<0 && s>=0.1 && s<=0.6) lightK=k; }
  if(lightK>0) fert=`Good window — light rain ${lightK===1?'tomorrow':'in '+lightK+' days'} will water it in.`;
  else if(heavy) fert=`Hold off — heavy rain in the next few days could wash it away before it absorbs.`;
  else fert=`Fine to apply — just water it in yourself afterward.`;
  const card=(icon,title,body)=>`<div class="card"><div style="display:flex;gap:11px;align-items:flex-start"><span style="font-size:22px">${icon}</span><div><div style="font-weight:700;font-size:14px">${title}</div><div class="muted" style="font-size:13px;line-height:1.5;margin-top:2px">${body}</div></div></div></div>`;
  return `<h1>Lawn & Weather</h1>${locBar}
    <div class="card">
      <div class="row"><div>
        <div class="stat-big" style="font-size:30px">${Math.round(num(cur?cur.temperature:HI[ti]))}°<span style="font-size:14px;color:var(--muted-2)">F</span></div>
        <div class="stat-sub">${cw.icon} ${cw.text} · H ${Math.round(num(HI[ti]))}° / L ${Math.round(num(LO[ti]))}°</div>
      </div><button class="btn btn-sm btn-ghost" onclick="fetchWeather()">↻</button></div>
      <div style="display:flex;gap:3px;margin-top:14px;overflow-x:auto">${strip}</div>
    </div>
    ${card('☔','Rain', rainTxt)}
    ${card('💧','Watering', water)}
    ${card('🚜','Mowing', mow)}
    ${card('🌱','Fertilizer', fert)}
    <p class="muted" style="text-align:center;font-size:11px">Rule-of-thumb guidance from the forecast — use your judgment. Updated ${new Date(wx.at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}.</p>`;
}

function importData(inp){

  r.onload=()=>{ try{ const raw=JSON.parse(r.result); if(!raw || !Array.isArray(raw.sessions) || !Array.isArray(raw.weights)) throw 0;

    catch(e){ alert('Not a valid backup file.'); } };
  r.readAsText(f);
}

/* ───────────────────────── Rest stopwatch (manual, separate from gym timer) ───────────────────────── */
let sw = { running:false, start:0, acc:0 };
function swElapsed(){ return sw.acc + (sw.running ? Date.now()-sw.start : 0); }
function swToggle(){ if(sw.running){ sw.acc+=Date.now()-sw.start; sw.running=false; } else { sw.start=Date.now(); sw.running=true; } updateStopwatch(); }
function swClear(){ sw.running=false; sw.acc=0; updateStopwatch(); }
function updateStopwatch(){
  const bar=document.getElementById('stopwatch'); if(!bar) return;
  const show=!!DB.draft;                       // only during an active workout
  bar.style.display = show?'flex':'none';
  document.body.classList.toggle('sw-on', show);
  if(!show){ restCtx=null; return; }           // no draft → drop any stale rest context
  const t=document.getElementById('sw-time'); if(t) t.textContent=fmtDur(swElapsed());
  const b=document.getElementById('sw-toggle'); if(b) b.textContent = sw.running?'❚❚':'▶';
  const tgt=document.getElementById('sw-target'), el=Math.floor(swElapsed()/1000);
  const inWin = restCtx && el>=restCtx.lo && el<=restCtx.hi, overWin = restCtx && el>restCtx.hi;
  if(tgt){ tgt.textContent = restCtx ? ('Target '+restCtx.label) : ''; tgt.classList.toggle('in', !!inWin); }
  if(t){ t.classList.toggle('in', !!inWin); t.classList.toggle('over', !!overWin); }
}
/* Keep the rest bar (with its target) visible above the on-screen keyboard during a workout.
   VisualViewport shrinks when the keyboard opens; lift the fixed tab bar by that inset. */
(function(){
  const vv = window.visualViewport; if(!vv) return;
  const bar = document.querySelector('.tabbar'); if(!bar) return;
  const apply = () => {
    const inset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);

/* ───────────────────────── Cardio log (manual + Strava file import) ─────────────────────────
   Stored canonically as { id, date, type, minutes, distanceKm, note, source }. Distance is kept
   in km internally and displayed in mi/km per the weight-unit preference. Strava .gpx computes
   distance (haversine over trackpoints) + elapsed time; .tcx reads structured laps; the bulk
   activities.csv is parsed row-by-row. Rolls up weekly minutes vs the ~150 min/week goal. */
const CARDIO_GOAL = 150;
const CARDIO_TYPES = ['Longboard','Walk','Run','Bike','Hike','Row','Swim','Elliptical','Other'];
let pendingCardio = null; // a single parsed import awaiting confirm
const distUnit = () => DB.unit==='kg' ? 'km' : 'mi';
const kmToDisp = km => DB.unit==='kg' ? km : km*0.621371;
const dispToKm = d => DB.unit==='kg' ? d : d/0.621371;
function fmtDist(km){ if(km==null||km==='') return ''; return (Math.round(kmToDisp(+km)*100)/100)+' '+distUnit(); }
function fmtMin(min){ min=Math.round(+min||0); if(min<60) return min+' min'; const h=Math.floor(min/60), m=min%60; return h+'h'+(m?' '+String(m).padStart(2,'0'):''); }
function cardioUid(){ return 'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function weeklyCardio(){ const m=+monday(new Date()); let min=0,km=0;
  (DB.cardio||[]).forEach(c=>{ if(+monday(new Date(c.date+'T00:00'))===m){ min+=(+c.minutes||0); km+=(+c.distanceKm||0); } });
  // stair-stepper finisher counts toward cardio (per the program guide) — read live from logged sessions
  (DB.sessions||[]).forEach(s=>{ const st=s.stairs;
    if(!s.skipped && st && !st.skipped && st.seconds!=='' && st.seconds!=null && +monday(new Date(s.date+'T00:00'))===m) min += (+st.seconds||0)/60; });
  return {min,km}; }
function haversineKm(a,b){ const R=6371, toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat), dLon=toR(b.lon-a.lon);
  const s=Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.min(1,Math.sqrt(s))); }
function mapCardioType(raw){ const s=String(raw||'').toLowerCase();
  if(s.includes('skate')||s.includes('board')) return 'Longboard';
  if(s.includes('run')) return 'Run';
  if(s.includes('walk')) return 'Walk';
  if(s.includes('hik')) return 'Hike';
  if(s.includes('ride')||s.includes('bik')||s.includes('cycl')) return 'Bike';
  if(s.includes('row')) return 'Row';
  if(s.includes('swim')) return 'Swim';
  if(s.includes('ellip')) return 'Elliptical';
  return 'Longboard'; } // default to his main activity; editable before save

function addCardio(){
  const date=(document.getElementById('cardio-date')||{}).value||todayISO();
  const type=(document.getElementById('cardio-type')||{}).value||'Longboard';

  const distV=parseFloat((document.getElementById('cardio-dist')||{}).value);
  const note=((document.getElementById('cardio-note')||{}).value||'').trim();
  if(!(min>0) && !(distV>0)){ toast('Enter minutes or distance'); return; }
  DB.cardio.push({ id:cardioUid(), date, type, minutes:min, distanceKm:(distV>0?dispToKm(distV):0), note, source:'manual' });
  save(); toast('Cardio logged 🛹'); render();

function removeCardio(id){ DB.cardio=(DB.cardio||[]).filter(c=>c.id!==id); save(); render(); }

function pickCardioFile(){ const el=document.getElementById('cardio-file'); if(el) el.click(); }
function handleCardioFile(inp){
  const f=inp.files[0]; if(!f) return; const name=(f.name||'').toLowerCase(); const r=new FileReader();
  r.onload=()=>{ try{
    let res;
    if(name.endsWith('.csv')) res=parseStravaCSV(r.result);
    else if(name.endsWith('.tcx') || r.result.indexOf('TrainingCenterDatabase')>=0) res=[parseTCX(r.result)];
    else res=[parseGPX(r.result)];
    res=(res||[]).filter(Boolean);
    if(!res.length) toast('No activities found in that file');
    else if(res.length===1){ pendingCardio=res[0]; render(); }
    else importCardioBatch(res);
  }catch(e){ toast('Could not read that file'); } finally { inp.value=''; } };
  r.readAsText(f);
}
function parseGPX(text){
  const doc=new DOMParser().parseFromString(text,'application/xml');
  const pts=[...doc.getElementsByTagName('trkpt')]; if(!pts.length) return null;
  let km=0, prev=null, firstT=null, lastT=null;
  pts.forEach(p=>{ const lat=parseFloat(p.getAttribute('lat')), lon=parseFloat(p.getAttribute('lon'));
    const tEl=p.getElementsByTagName('time')[0], t=tEl?Date.parse(tEl.textContent):NaN;
    if(!isNaN(t)){ if(firstT==null)firstT=t; lastT=t; }
    if(prev && !isNaN(lat) && !isNaN(lon)) km+=haversineKm(prev,{lat,lon}); if(!isNaN(lat)&&!isNaN(lon)) prev={lat,lon}; });
  const minutes = (firstT!=null&&lastT!=null) ? Math.max(0,(lastT-firstT)/60000) : 0;
  const date = firstT!=null ? new Date(firstT).toLocaleDateString('en-CA') : todayISO();
  const tp=doc.getElementsByTagName('type')[0];
  return { id:cardioUid(), date, type:mapCardioType(tp?tp.textContent:''), minutes:Math.round(minutes), distanceKm:Math.round(km*1000)/1000, note:'', source:'strava' };
}
function parseTCX(text){
  const doc=new DOMParser().parseFromString(text,'application/xml');
  const act=doc.getElementsByTagName('Activity')[0], laps=[...doc.getElementsByTagName('Lap')];
  if(!laps.length && !act) return null;
  let sec=0, m=0;
  laps.forEach(l=>{ const ts=l.getElementsByTagName('TotalTimeSeconds')[0], ds=l.getElementsByTagName('DistanceMeters')[0];
    if(ts) sec+=parseFloat(ts.textContent)||0; if(ds) m+=parseFloat(ds.textContent)||0; });
  const idEl=act?act.getElementsByTagName('Id')[0]:null;
  const dRaw=idEl?idEl.textContent:''; const d=dRaw?new Date(dRaw):null;
  const date = d && !isNaN(d) ? d.toLocaleDateString('en-CA') : todayISO();
  return { id:cardioUid(), date, type:mapCardioType(act?act.getAttribute('Sport'):''), minutes:Math.round(sec/60), distanceKm:Math.round(m)/1000, note:'', source:'strava' };
}
/* Minimal CSV reader honoring quoted fields and embedded newlines. */
function csvRows(text){
  const rows=[]; let row=[], field='', q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; } else field+=c; }
    else if(c==='"') q=true;
    else if(c===',') { row.push(field); field=''; }
    else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
    else if(c!=='\r') field+=c; }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows;
}
function parseStravaCSV(text){
  const rows=csvRows(text); if(rows.length<2) return [];
  const head=rows[0].map(h=>h.trim().toLowerCase());
  const idx=names=>{ for(const n of names){ const i=head.indexOf(n); if(i>=0) return i; }
    for(let i=0;i<head.length;i++){ if(names.some(n=>head[i].includes(n))) return i; } return -1; };
  const iDate=idx(['activity date','date']), iType=idx(['activity type','type']),
        iMov=idx(['moving time']), iEla=idx(['elapsed time']), iDist=idx(['distance']);
  const out=[];
  for(let r=1;r<rows.length;r++){ const row=rows[r]; if(!row||!row.length) continue;
    const dRaw=iDate>=0?row[iDate]:''; const d=dRaw?new Date(dRaw):null;
    const date = d && !isNaN(d) ? d.toLocaleDateString('en-CA') : null; if(!date) continue;
    let sec=iMov>=0?parseFloat(row[iMov]):NaN; if(isNaN(sec)&&iEla>=0) sec=parseFloat(row[iEla]);
    const minutes=isNaN(sec)?0:Math.round(sec/60);
    let km=iDist>=0?parseFloat(row[iDist]):NaN; if(isNaN(km)) km=0; if(km>300) km=km/1000; // guard: a huge value is meters
    if(!minutes && !(km>0)) continue;
    out.push({ id:cardioUid(), date, type:mapCardioType(iType>=0?row[iType]:''), minutes, distanceKm:km, note:'', source:'strava' });
  }
  return out;
}
function importCardioBatch(list){
  const key=c=>`${c.date}|${c.type}|${Math.round(c.minutes)}|${Math.round((c.distanceKm||0)*100)}`;
  const seen=new Set((DB.cardio||[]).map(key)); let added=0, dup=0;
  list.forEach(c=>{ const k=key(c); if(seen.has(k)){ dup++; return; } seen.add(k); DB.cardio.push(c); added++; });
  save(); render(); toast(`Imported ${added}${dup?` · skipped ${dup} dup${dup!==1?'s':''}`:''}`);
}

   Whole DB is stored as one JSON blob at users/{uid}. Strategy: pull on sign-in, push on
   every save (debounced), plus a live listener so the other device updates in near-real-time.
   Conflicts resolve last-write-wins by `updatedAt`; the FIRST connect asks which copy to keep
   if both sides already hold data, so nothing is silently overwritten. Signed-out = local only. */
const firebaseConfig = {
  apiKey: "AIzaSyA7fxqZoTkHvhRJVSZKC4RVjotIujZMN_4",

/* Adopt the remote copy into local WITHOUT re-pushing (write straight to localStorage, no save()). */
function adoptRemote(remote){
  try{ const raw=JSON.parse(remote.blob); DB=normalize(raw); DB.updatedAt=remote.updatedAt||Date.now();
    localStorage.setItem(KEY, JSON.stringify(DB)); render(); return true; }catch(e){ return false; }
}
const SYNCED_UID_KEY='ppl_synced_uid'; // device-local: which account this device has already linked to
async function onSignedIn(user){
  SYNC.docRef = fbDb.collection('users').doc(user.uid);
  SYNC.status='Syncing…'; updateSyncUI();
  try{
    const snap = await SYNC.docRef.get();
    const remote = snap.exists ? snap.data() : null;
    const localHasData = (DB.sessions&&DB.sessions.length)||(DB.weights&&DB.weights.length);
    // Only the FIRST time this device links to this account do we risk a real conflict; after that
    // it's routine catch-up and we resolve silently by timestamp (last-write-wins).
    const firstLink = localStorage.getItem(SYNCED_UID_KEY)!==user.uid;
    if(remote && remote.blob){
      const rUpd=remote.updatedAt||0, lUpd=DB.updatedAt||0, differs = remote.blob!==JSON.stringify(DB);
      if(differs && localHasData && lUpd>0 && firstLink){
        const useCloud = confirm('This device and the cloud both have workout data.\n\nOK = use the CLOUD copy (replaces what\'s on this device).\nCancel = keep THIS device (replaces the cloud copy).');
        if(useCloud) adoptRemote(remote); else await pushNow(true);
      } else if(rUpd >= lUpd){ adoptRemote(remote); }
      else { await pushNow(true); }
    } else { await pushNow(true); } // cloud empty → seed it from this device
    localStorage.setItem(SYNCED_UID_KEY, user.uid); // mark this device linked; no more first-link prompt
    startLiveSync();
    SYNC.lastSyncAt=Date.now(); SYNC.status='Synced'; updateSyncUI();
  }catch(e){ SYNC.status='Sync error: '+((e&&e.code)||(e&&e.message)||''); updateSyncUI(); }
}
function startLiveSync(){
  if(!SYNC.docRef) return; if(SYNC.unsub) SYNC.unsub();

    if(!snap.exists || snap.metadata.hasPendingWrites) return; // skip the echo of our own writes
    const remote=snap.data(); const rUpd=remote.updatedAt||0, lUpd=DB.updatedAt||0;
    if(remote.blob && rUpd>lUpd && remote.blob!==JSON.stringify(DB)){ adoptRemote(remote); SYNC.lastSyncAt=Date.now(); updateSyncUI(); toast('Synced from another device'); }
  }, ()=>{ SYNC.status='Sync error'; updateSyncUI(); });
}
async function pushNow(silent){
  if(!SYNC.docRef){ if(!silent) toast('Sign in to sync'); return; }

    if(!DB.updatedAt) DB.updatedAt=Date.now();
    await SYNC.docRef.set({ blob: JSON.stringify(DB), updatedAt: DB.updatedAt, schema: SCHEMA, at: Date.now() });
    SYNC.lastSyncAt=Date.now(); SYNC.status='Synced'; if(!silent) toast('Synced ✓'); updateSyncUI();

}

function toggleIdeaDone(id){ const it=(DB.ideas||[]).find(x=>x.id===id); if(!it) return; it.done=!it.done; save(); renderIdeasList(); }
function renderIdeasList(){
  const list=DB.ideas||[], box=document.getElementById('ideas-list'), cnt=document.getElementById('idea-count');
  if(cnt) cnt.textContent = list.length ? `${list.filter(i=>!i.done).length} open · ${list.length} total` : '';
  if(!box) return;
  box.innerHTML = list.length ? list.map(i=>`<div class="idea-item${i.done?' done':''}">
    <input type="checkbox" ${i.done?'checked':''} onchange="toggleIdeaDone('${i.id}')" style="margin-top:2px">
    <span class="txt">${esc(i.text)}<span class="muted" style="font-size:11px"> · ${fmtDate(i.date)}</span></span>
    <button class="x-set" onclick="removeIdea('${i.id}')" title="delete">×</button>
  </div>`).join('') : '<p class="muted" style="font-size:13px;padding:8px 0">No ideas yet — add one above while you\'re using the app.</p>';
}
function copyIdeas(){
  const list=DB.ideas||[]; if(!list.length){ toast('No ideas to copy'); return; }
  const text = `PPL Tracker — ideas (${list.length})\n` + list.map(i=>`- [${i.done?'x':' '}] ${i.text} (${fmtDate(i.date)})`).join('\n');
  const done=()=>toast('Copied ✓ — paste it to me');
  if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  else fallbackCopy(text, done);
}
function fallbackCopy(text, cb){ try{ const ta=document.createElement('textarea'); ta.value=text; ta.style.cssText='position:fixed;opacity:0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); cb(); }catch(e){ toast('Copy failed'); } }

/* ───────────────────────── Boot ───────────────────────── */
buildTabBar();
render();
updateStopwatch();
</script>
